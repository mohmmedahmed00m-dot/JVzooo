name: Unzip To Repo Root

on:
  push:
    tags-ignore:
      - '**'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip rsync

      - name: Extract every zip directly into repo root
        run: |
          set -euo pipefail
          shopt -s nullglob dotglob

          # جمع كل ملفات الـ zip الموجودة في المستودع (باستثناء .git و .github)
          mapfile -d '' -t ZIPS < <(find . \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -type f -iname '*.zip' -print0)

          if [ "${#ZIPS[@]}" -eq 0 ]; then
            echo "لا توجد ملفات zip لمعالجتها — لا شيء للقيام به."
            exit 0
          fi

          for zip in "${ZIPS[@]}"; do
            echo "▶ معالجة: $zip"
            tmp="$(mktemp -d)"
            unzip -o -q "$zip" -d "$tmp"

            # لو كل المحتوى داخل مجلد غلاف واحد (مثل jvz-main/)، خذ محتوياته فقط
            entries=("$tmp"/*)
            if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
              src="${entries[0]}"
              echo "   ↳ مجلد غلاف تم اكتشافه: $(basename "$src") — سيُنقل محتواه فقط إلى الجذر"
            else
              src="$tmp"
            fi

            # نسخ المحتوى إلى جذر المستودع مباشرة، مع استثناء .git و .github
            rsync -a --exclude='.git/' --exclude='.github/' "$src"/ ./

            rm -rf "$tmp"
            rm -f "$zip"
            echo "   ✅ تم الاستخراج إلى الجذر وحذف $zip"
          done

          # تنظيف أي مجلدات extracted_* متبقية من تشغيلات سابقة لووركفلو قديم
          if compgen -G "./extracted_*" > /dev/null; then
            echo "🧹 حذف مجلدات extracted_* القديمة..."
            rm -rf ./extracted_*
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "⚠️  لا توجد تغييرات لعملها."
          else
            git commit -m "🤖 Auto unzip: extracted project into repo root [skip ci]"
            git push origin HEAD:"${GITHUB_REF_NAME}"
            echo "✅ تم الدفع بنجاح إلى الفرع: ${GITHUB_REF_NAME}"
          fi
